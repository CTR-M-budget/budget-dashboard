<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>예산실적 분석 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f7f8fa; --card: #ffffff; --line: #e5e7eb;
    --text: #1f2937; --muted: #6b7280; --accent: #2563eb;
    --good: #059669; --bad: #dc2626; --warn: #d97706;
  }
  * { box-sizing: border-box; }
  body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:'Pretendard',-apple-system,sans-serif; font-size:13px; line-height:1.5; }
  header { background:#fff; border-bottom:1px solid var(--line); padding:16px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:16px; }
  h1 { font-size:18px; margin:0; font-weight:600; }
  .subtitle { color:var(--muted); font-size:12px; margin-top:2px; }
  .container { padding:20px 24px; max-width:1600px; margin:0 auto; }
  .upload-zone { background:#fff; border:2px dashed var(--line); border-radius:10px;
    padding:40px; text-align:center; cursor:pointer; transition:border-color .15s; }
  .upload-zone:hover, .upload-zone.dragging { border-color:var(--accent); background:#eff6ff; }
  .upload-zone input { display:none; }
  .upload-zone-text { font-size:14px; color:var(--muted); }
  .upload-zone-hint { font-size:12px; color:var(--muted); margin-top:4px; }
  .filters { background:#fff; border:1px solid var(--line); border-radius:10px;
    padding:14px 18px; margin-bottom:16px; display:flex; flex-wrap:wrap; gap:16px; align-items:center; }
  .filter-group { display:flex; align-items:center; gap:6px; }
  .filter-label { font-size:11px; color:var(--muted); font-weight:500; }
  .chip { padding:5px 12px; border:1px solid var(--line); border-radius:16px;
    background:#fff; cursor:pointer; font-size:12px; transition:all .12s; }
  .chip:hover { border-color:var(--accent); }
  .chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
  .kpi-grid-5 { grid-template-columns:repeat(5,1fr); }
  @media (max-width:1100px) { .kpi-grid-5 { grid-template-columns:repeat(3,1fr); } }
  .kpi { background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px; }
  .kpi-label { font-size:11px; color:var(--muted); font-weight:500; }
  .kpi-value { font-size:22px; font-weight:600; margin-top:4px; }
  .kpi-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .kpi-value.good { color:var(--good); }
  .kpi-value.bad { color:var(--bad); }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px; }
  .card-title { font-size:13px; font-weight:600; margin-bottom:12px; }
  .chart-wrap { position:relative; height:280px; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  thead th { background:#f9fafb; text-align:left; padding:8px 10px; font-weight:600;
    border-bottom:1px solid var(--line); position:sticky; top:0; cursor:pointer; user-select:none; }
  thead th.num { text-align:right; }
  tbody td { padding:7px 10px; border-bottom:1px solid #f3f4f6; }
  tbody td.num { text-align:right; font-variant-numeric:tabular-nums; }
  tbody tr:hover { background:#f9fafb; }
  .neg { color:var(--bad); } .pos { color:var(--good); }
  .var-bad { background:#fee2e2; color:var(--bad); font-weight:600; padding:2px 6px; border-radius:4px; display:inline-block; }
  .var-good { background:#d1fae5; color:var(--good); font-weight:600; padding:2px 6px; border-radius:4px; display:inline-block; }
  .var-warn { background:#fef3c7; color:var(--warn); padding:2px 6px; border-radius:4px; display:inline-block; }
  .var-neutral { color:var(--muted); padding:2px 6px; }
  .search-input { padding:5px 10px; border:1px solid var(--line); border-radius:6px; font-size:12px; width:200px; }
  .cc-select { padding:5px 10px; border:1px solid var(--line); border-radius:16px; background:#fff;
    font-size:12px; font-family:inherit; cursor:pointer; min-width:200px; max-width:340px; }
  .cc-select:hover, .cc-select:focus { border-color:var(--accent); outline:none; }
  .cc-select.active-filter { background:#eff6ff; border-color:var(--accent); color:var(--accent); font-weight:500; }
  .scroll-table { max-height:480px; overflow:auto; border:1px solid var(--line); border-radius:8px; }
  .empty { text-align:center; padding:60px; color:var(--muted); }
  .hidden { display:none !important; }
  .badge { background:#eff6ff; color:var(--accent); padding:2px 8px; border-radius:10px; font-size:11px; font-weight:500; }
  .badge.muted { background:#f3f4f6; color:var(--muted); }
  .log { font-size:11px; color:var(--muted); background:#f9fafb; padding:8px 12px; border-radius:6px;
    margin-top:8px; max-height:100px; overflow:auto; font-family:ui-monospace,monospace; }
  .toolbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .actual-link { cursor:pointer; color:var(--accent); text-decoration:underline dotted; text-underline-offset:3px; }
  .actual-link:hover { background:#eff6ff; }
  .modal-backdrop { position:fixed; inset:0; background:rgba(15,23,42,0.45);
    display:none; align-items:center; justify-content:center; z-index:1000; }
  .modal-backdrop.open { display:flex; }
  .modal { background:#fff; width:min(1100px,92vw); max-height:86vh; border-radius:12px;
    display:flex; flex-direction:column; box-shadow:0 10px 40px rgba(0,0,0,0.25); overflow:hidden; }
  .modal-header { padding:16px 20px; border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:flex-start; gap:16px; }
  .modal-title { font-size:16px; font-weight:600; margin:0 0 4px 0; }
  .modal-subtitle { font-size:12px; color:var(--muted); }
  .modal-close { background:none; border:none; font-size:22px; cursor:pointer;
    color:var(--muted); padding:0 6px; line-height:1; }
  .modal-close:hover { color:var(--text); }
  .modal-body { flex:1; overflow:auto; padding:12px 20px 16px; }
  .modal-stats { display:flex; gap:24px; background:#f9fafb; border-radius:8px;
    padding:10px 14px; margin-bottom:12px; font-size:12px; }
  .modal-stat-label { color:var(--muted); margin-right:6px; }
  .modal-stat-value { font-weight:600; font-variant-numeric:tabular-nums; }
  .modal table { width:100%; }
  .modal thead th { font-size:11px; padding:7px 8px; }
  .modal tbody td { font-size:11.5px; padding:6px 8px; }
  .modal-empty { padding:40px; text-align:center; color:var(--muted); }
</style>
</head>
<body>

<header>
  <div>
    <h1>예산실적 분석 대시보드</h1>
    <div class="subtitle">CTR 경영관리팀 · 코스트센터 × 원가요소 · 경영예산·편성예산·실적 비교</div>
  </div>
  <div id="file-info" class="hidden">
    <span class="badge" id="file-name"></span>
    <span class="badge muted" id="data-freshness"></span>
    <button class="chip" onclick="document.getElementById('file-input').click()">다른 파일 미리보기</button>
  </div>
</header>

<div class="container">

  <div id="upload-section">
    <label class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".xlsx,.xls">
      <div style="font-size:28px; color:var(--accent); margin-bottom:8px;">↑</div>
      <div class="upload-zone-text"><strong id="upload-title">서버 데이터를 불러오는 중...</strong></div>
      <div class="upload-zone-hint" id="upload-hint">자동 로드되지 않으면 엑셀 파일을 끌어다 놓거나 클릭해서 선택</div>
    </label>
    <div id="parse-log" class="log hidden"></div>
  </div>

  <div id="actual-modal" class="modal-backdrop">
    <div class="modal" role="dialog" aria-labelledby="modal-title">
      <div class="modal-header">
        <div>
          <h3 class="modal-title" id="modal-title">실적 상세</h3>
          <div class="modal-subtitle" id="modal-subtitle"></div>
        </div>
        <button class="modal-close" id="modal-close" aria-label="닫기">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-stats">
          <div><span class="modal-stat-label">전표 수</span><span class="modal-stat-value" id="modal-count">-</span></div>
          <div><span class="modal-stat-label">실적 합계</span><span class="modal-stat-value" id="modal-sum">-</span></div>
          <div><span class="modal-stat-label">기간</span><span class="modal-stat-value" id="modal-range">-</span></div>
        </div>
        <div id="modal-content"></div>
      </div>
    </div>
  </div>

  <div id="dashboard" class="hidden">
    <div class="filters">
      <div class="filter-group"><span class="filter-label">단일 월</span><div id="single-month-chips"></div></div>
      <div class="filter-group"><span class="filter-label">누적</span><div id="cum-month-chips"></div></div>
    </div>
    <div class="filters">
      <div class="filter-group"><span class="filter-label">사업장</span><div id="site-chips"></div></div>
      <div class="filter-group">
        <span class="filter-label">코스트센터</span>
        <select id="cc-select" class="cc-select"><option value="all">전체</option></select>
        <button class="chip" id="cc-reset" title="코스트센터 필터 해제" style="padding:5px 8px;">×</button>
      </div>
    </div>

    <div class="kpi-grid kpi-grid-5">
      <div class="kpi"><div class="kpi-label">경영예산</div><div class="kpi-value" id="kpi-mng">-</div><div class="kpi-sub">백만원</div></div>
      <div class="kpi"><div class="kpi-label">편성예산</div><div class="kpi-value" id="kpi-pln">-</div><div class="kpi-sub">백만원</div></div>
      <div class="kpi"><div class="kpi-label">실적</div><div class="kpi-value" id="kpi-actual">-</div><div class="kpi-sub">백만원</div></div>
      <div class="kpi"><div class="kpi-label">차이 (실적 − 경영예산)</div><div class="kpi-value" id="kpi-var">-</div><div class="kpi-sub" id="kpi-var-sub">백만원</div></div>
      <div class="kpi"><div class="kpi-label">차이율 (vs 경영예산)</div><div class="kpi-value" id="kpi-varpct">-</div><div class="kpi-sub">±10% 임계</div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title" id="chart-site-title">사업장별 예산 vs 실적 (백만원)</div>
        <div class="chart-wrap"><canvas id="chart-site"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title" id="chart-trend-title">월별 추이 (백만원)</div>
        <div class="chart-wrap"><canvas id="chart-trend"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="card-title" style="margin:0;">코스트센터 × 원가요소 상세</div>
        <input type="search" class="search-input" id="table-search" placeholder="코스트센터/원가요소 검색...">
      </div>
      <div class="scroll-table">
        <table id="detail-table">
          <thead>
            <tr>
              <th data-sort="site">사업장</th>
              <th data-sort="cc">코스트센터</th>
              <th data-sort="ccname">코스트센터명</th>
              <th data-sort="elem">원가요소</th>
              <th class="num" data-sort="mng">경영예산</th>
              <th class="num" data-sort="pln">편성예산</th>
              <th class="num" data-sort="actual">실적</th>
              <th class="num" data-sort="var">차이</th>
              <th class="num" data-sort="varpct">차이율</th>
            </tr>
          </thead>
          <tbody id="detail-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// 예산실적 분석 대시보드 — Web Edition (자동 로드 + 미리보기 폴백)
// 최초 작성: 2026-05-11, 웹버전 전환: 2026-05-15
const SITE_MAP = { '1210':'울산', '1230':'서산', '1240':'대구', '1290':'법인' };
const SITE_ORDER = ['울산','서산','대구','법인','기타'];
const VAR_THRESHOLD = 10;

let RAW_DATA = [], ACTUAL_DETAILS = [], MONTHS_AVAILABLE = [];
let STATE = { mode:'cumulative', singleMonth:null, cumulativeUpTo:null,
  selectedSite:'all', selectedCc:'all', sortBy:'var', sortDir:'desc', search:'' };
let chartSite = null, chartTrend = null;

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const parseLog = document.getElementById('parse-log');

function log(msg) {
  parseLog.classList.remove('hidden');
  parseLog.textContent += msg + '\n';
  parseLog.scrollTop = parseLog.scrollHeight;
}

dropZone.addEventListener('click', e => { if (e.target.tagName !== 'INPUT') fileInput.click(); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragging');
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

async function handleFile(file) {
  parseLog.textContent = '';
  log(`파일 읽는 중: ${file.name}`);
  document.getElementById('file-name').textContent = file.name;
  document.getElementById('file-info').classList.remove('hidden');

  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type:'array', cellDates:false });
    log(`시트 발견: ${wb.SheetNames.join(', ')}`);
    const targetSheet = wb.SheetNames.find(n => /예산조회.*items/i.test(n.replace(/\s/g,''))) ||
                        wb.SheetNames.find(n => n.includes('예산조회')) || wb.SheetNames[0];
    log(`사용 시트: ${targetSheet}`);
    const sheet = wb.Sheets[targetSheet];
    const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'', raw:true });
    log(`전체 행 수: ${rows.length}`);

    let headerRow = -1;
    for (let i = 0; i < Math.min(rows.length, 20); i++) {
      const joined = rows[i].map(c => String(c)).join('|');
      if (/코스트센터|원가요소/.test(joined)) { headerRow = i; break; }
    }
    if (headerRow < 0) { log('⚠ 헤더 자동 탐지 실패 — 1행 사용'); headerRow = 0; }
    log(`헤더 행: ${headerRow + 1}행`);

    const headers = rows[headerRow].map(c => String(c).trim());
    log(`헤더: ${headers.filter(h => h).slice(0,15).join(', ')}${headers.length > 15 ? '...' : ''}`);
    const dataRows = rows.slice(headerRow + 1).filter(r => r.some(c => c !== '' && c !== null));
    log(`데이터 행 수: ${dataRows.length}`);

    const findCol = (...patterns) => {
      for (const p of patterns) {
        const re = new RegExp(p);
        const idx = headers.findIndex(h => re.test(h.replace(/\s/g,'')));
        if (idx >= 0) return idx;
      }
      return -1;
    };
    const cols = {
      cc: findCol('^코스트센터$','코스트센터번호','코스트센터코드','^CC$'),
      ccname: findCol('코스트센터명','코스트센터.*이름'),
      elem: findCol('^원가요소$','원가요소번호','원가요소코드'),
      elemname: findCol('원가요소명','원가요소.*이름','계정과목'),
      btype: findCol('예산종류','예산구분','구분','버전'),
      amount: -1,
      month: findCol('회계기간','회계월','^월$','기간')
    };
    if (headers.length > 10) cols.amount = 10;
    if (cols.amount < 0 || headers[10] === '') cols.amount = findCol('^금액$','발생액','실적금액');
    log(`매핑: CC=${cols.cc}, CC명=${cols.ccname}, 원가요소=${cols.elem}, 원가요소명=${cols.elemname}, 예산종류=${cols.btype}, 금액=${cols.amount}, 월=${cols.month}`);

    const monthColCandidates = [];
    headers.forEach((h, i) => {
      const m = h.match(/^(\d{1,2})월$/);
      if (m) monthColCandidates.push({ month: parseInt(m[1]), col: i });
    });
    const isWideFormat = monthColCandidates.length > 0 && cols.month < 0;
    if (isWideFormat) log(`Wide 형태: ${monthColCandidates.map(c => c.month + '월').join(', ')}`);

    const parsed = [];
    for (const row of dataRows) {
      const cc = String(row[cols.cc] || '').trim();
      if (!cc) continue;
      const ccname = String(row[cols.ccname] || '').trim();
      const elem = String(row[cols.elem] || '').trim();
      const elemname = String(row[cols.elemname] || elem || '').trim();
      const btype = String(row[cols.btype] || '').trim();
      const site = SITE_MAP[cc.substring(0, 4)] || '기타';
      if (isWideFormat) {
        for (const mc of monthColCandidates) {
          const amt = parseFloat(row[mc.col]) || 0;
          if (amt !== 0) parsed.push({ site, cc, ccname, elem, elemname, btype, month: mc.month, amount: amt });
        }
      } else {
        const amt = parseFloat(row[cols.amount]) || 0;
        const month = cols.month >= 0 ? parseInt(String(row[cols.month]).replace(/\D/g,'')) : null;
        if (amt !== 0) parsed.push({ site, cc, ccname, elem, elemname, btype, month, amount: amt });
      }
    }
    log(`정제 후: ${parsed.length}건 (0 제외)`);
    const btypeSet = new Set(parsed.map(r => r.btype).filter(b => b));
    log(`예산종류: ${[...btypeSet].join(', ') || '(없음)'}`);
    const monthSet = new Set(parsed.map(r => r.month).filter(m => m));
    MONTHS_AVAILABLE = [...monthSet].sort((a, b) => a - b);
    log(`월: ${MONTHS_AVAILABLE.join(', ')}월`);

    RAW_DATA = parsed;
    if (RAW_DATA.length === 0) { log('⚠ 사용 가능한 데이터 없음'); return; }
    ACTUAL_DETAILS = parseActualSheet(wb);
    log(`실적 전표: ${ACTUAL_DETAILS.length}건`);

    initFilters();
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('upload-section').classList.add('hidden');
    render();
  } catch (err) {
    log(`❌ 오류: ${err.message}`); console.error(err);
  }
}

function initFilters() {
  STATE.cumulativeUpTo = Math.max(...MONTHS_AVAILABLE);
  STATE.singleMonth = null; STATE.mode = 'cumulative';
  const sm = document.getElementById('single-month-chips'); sm.innerHTML = '';
  for (const m of MONTHS_AVAILABLE) {
    const c = document.createElement('button'); c.className = 'chip'; c.textContent = m + '월'; c.dataset.month = m; sm.appendChild(c);
  }
  const cm = document.getElementById('cum-month-chips'); cm.innerHTML = '';
  const sortedMonths = [...MONTHS_AVAILABLE].sort((a, b) => a - b);
  for (const m of sortedMonths) {
    if (m === sortedMonths[0]) continue;
    const c = document.createElement('button'); c.className = 'chip'; c.textContent = `1~${m}월`; c.dataset.cum = m;
    if (m === STATE.cumulativeUpTo) c.classList.add('active');
    cm.appendChild(c);
  }
  sm.addEventListener('click', e => {
    if (!e.target.dataset.month) return;
    [...sm.children].forEach(c => c.classList.remove('active'));
    [...cm.children].forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    STATE.mode = 'single'; STATE.singleMonth = parseInt(e.target.dataset.month); render();
  });
  cm.addEventListener('click', e => {
    if (!e.target.dataset.cum) return;
    [...sm.children].forEach(c => c.classList.remove('active'));
    [...cm.children].forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    STATE.mode = 'cumulative'; STATE.cumulativeUpTo = parseInt(e.target.dataset.cum); render();
  });
  const sc = document.getElementById('site-chips'); sc.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'chip active'; allChip.textContent = '전체'; allChip.dataset.site = 'all'; sc.appendChild(allChip);
  const sitesInData = [...new Set(RAW_DATA.map(r => r.site))];
  for (const s of SITE_ORDER.filter(s => sitesInData.includes(s))) {
    const c = document.createElement('button'); c.className = 'chip'; c.textContent = s; c.dataset.site = s; sc.appendChild(c);
  }
  sc.addEventListener('click', e => {
    if (!e.target.dataset.site) return;
    [...sc.children].forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    STATE.selectedSite = e.target.dataset.site; STATE.selectedCc = 'all';
    refreshCcOptions(); render();
  });
  refreshCcOptions();
  const ccSel = document.getElementById('cc-select');
  ccSel.addEventListener('change', () => {
    STATE.selectedCc = ccSel.value;
    ccSel.classList.toggle('active-filter', STATE.selectedCc !== 'all'); render();
  });
  document.getElementById('cc-reset').addEventListener('click', () => {
    STATE.selectedCc = 'all'; ccSel.value = 'all'; ccSel.classList.remove('active-filter'); render();
  });
  document.getElementById('table-search').addEventListener('input', e => {
    STATE.search = e.target.value.toLowerCase(); renderTable();
  });
  document.querySelectorAll('#detail-table thead th').forEach(th => {
    th.addEventListener('click', () => {
      const sortBy = th.dataset.sort;
      if (STATE.sortBy === sortBy) STATE.sortDir = STATE.sortDir === 'desc' ? 'asc' : 'desc';
      else { STATE.sortBy = sortBy; STATE.sortDir = 'desc'; }
      renderTable();
    });
  });
}

function fmt(n) {
  if (n === 0 || isNaN(n)) return '0';
  const sign = n < 0 ? '-' : ''; const abs = Math.abs(n);
  return sign + abs.toLocaleString('ko-KR', { maximumFractionDigits: 1 });
}
const toMillion = n => n / 1_000_000;
const matchMonth = row => { if (!row.month) return false;
  if (STATE.mode === 'single') return row.month === STATE.singleMonth;
  return row.month <= STATE.cumulativeUpTo; };
const timeLabel = () => STATE.mode === 'single' ? `${STATE.singleMonth}월 단일` : `1~${STATE.cumulativeUpTo}월 누적`;
const matchSite = row => STATE.selectedSite === 'all' || row.site === STATE.selectedSite;
const matchCc = row => STATE.selectedCc === 'all' || row.cc === STATE.selectedCc;

function refreshCcOptions() {
  const ccSel = document.getElementById('cc-select'); if (!ccSel) return;
  const map = new Map();
  for (const r of RAW_DATA) {
    if (STATE.selectedSite !== 'all' && r.site !== STATE.selectedSite) continue;
    if (!map.has(r.cc)) map.set(r.cc, r.ccname || '');
  }
  const entries = [...map.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  ccSel.innerHTML = '<option value="all">전체 (' + entries.length + '개)</option>';
  for (const [cc, name] of entries) {
    const opt = document.createElement('option'); opt.value = cc; opt.textContent = `${cc} · ${name}`; ccSel.appendChild(opt);
  }
  ccSel.value = STATE.selectedCc;
  ccSel.classList.toggle('active-filter', STATE.selectedCc !== 'all');
}

const isMng = b => b.includes('경영') && b.includes('예산');
const isPln = b => b.includes('편성') && b.includes('예산');
const isActual = b => b.includes('실적') || b === 'Actual' || b === '발생';

function aggregate() {
  const map = new Map();
  for (const r of RAW_DATA) {
    if (!matchMonth(r) || !matchSite(r) || !matchCc(r)) continue;
    const key = `${r.site}|${r.cc}|${r.ccname}|${r.elem}|${r.elemname}`;
    let rec = map.get(key);
    if (!rec) { rec = { site:r.site, cc:r.cc, ccname:r.ccname, elem:r.elem, elemname:r.elemname, mng:0, pln:0, actual:0 }; map.set(key, rec); }
    if (isMng(r.btype)) rec.mng += r.amount;
    else if (isPln(r.btype)) rec.pln += r.amount;
    else if (isActual(r.btype)) rec.actual += r.amount;
  }
  return [...map.values()].map(r => ({
    ...r, mng_m:toMillion(r.mng), pln_m:toMillion(r.pln), actual_m:toMillion(r.actual),
    var_m:toMillion(r.actual - r.mng),
    varpct: r.mng !== 0 ? ((r.actual - r.mng) / r.mng * 100) : null
  }));
}

function render() {
  const ccLabel = STATE.selectedCc !== 'all' ? (() => {
    const r = RAW_DATA.find(x => x.cc === STATE.selectedCc);
    return r ? ` · ${STATE.selectedCc} ${r.ccname || ''}` : ` · ${STATE.selectedCc}`;
  })() : '';
  const siteLabel = STATE.selectedSite !== 'all' ? ` · ${STATE.selectedSite}` : '';
  const timeLab = ` · ${timeLabel()}`;
  document.getElementById('chart-site-title').textContent = `사업장별 비교 (백만원)${timeLab}${siteLabel}${ccLabel}`;
  document.getElementById('chart-trend-title').textContent = `월별 추이 (백만원)${siteLabel}${ccLabel}`;
  const data = aggregate();
  const totalMng = data.reduce((s, r) => s + r.mng_m, 0);
  const totalPln = data.reduce((s, r) => s + r.pln_m, 0);
  const totalActual = data.reduce((s, r) => s + r.actual_m, 0);
  const totalVar = totalActual - totalMng;
  const totalVarPct = totalMng !== 0 ? (totalVar / totalMng * 100) : 0;
  document.getElementById('kpi-mng').textContent = fmt(totalMng);
  document.getElementById('kpi-pln').textContent = fmt(totalPln);
  document.getElementById('kpi-actual').textContent = fmt(totalActual);
  const varEl = document.getElementById('kpi-var');
  varEl.textContent = fmt(totalVar);
  varEl.className = 'kpi-value ' + (totalVar < 0 ? 'good' : totalVar > 0 ? 'bad' : '');
  const varPctEl = document.getElementById('kpi-varpct');
  varPctEl.textContent = (totalVarPct > 0 ? '+' : '') + totalVarPct.toFixed(1) + '%';
  varPctEl.className = 'kpi-value ' + (Math.abs(totalVarPct) >= VAR_THRESHOLD ? (totalVar > 0 ? 'bad' : 'good') : '');
  renderSiteChart(data); renderTrendChart(); renderTable(data);
}

function renderSiteChart(data) {
  const bySite = {};
  for (const r of data) {
    if (!bySite[r.site]) bySite[r.site] = { mng:0, pln:0, actual:0 };
    bySite[r.site].mng += r.mng_m; bySite[r.site].pln += r.pln_m; bySite[r.site].actual += r.actual_m;
  }
  const labels = SITE_ORDER.filter(s => bySite[s]);
  if (chartSite) chartSite.destroy();
  chartSite = new Chart(document.getElementById('chart-site'), {
    type:'bar',
    data: { labels, datasets:[
      { label:'경영예산', data: labels.map(s => bySite[s].mng), backgroundColor:'#93c5fd', borderRadius:4 },
      { label:'편성예산', data: labels.map(s => bySite[s].pln), backgroundColor:'#60a5fa', borderRadius:4 },
      { label:'실적', data: labels.map(s => bySite[s].actual), backgroundColor:'#1d4ed8', borderRadius:4 }
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{ font:{ family:'Pretendard', size:11 } } },
        tooltip:{ callbacks:{ label: ctx => `${ctx.dataset.label}: ${fmt(ctx.parsed.y)} 백만원` } } },
      scales:{ y:{ beginAtZero:true, ticks:{ callback:v=>fmt(v), font:{ family:'Pretendard' } } },
        x:{ ticks:{ font:{ family:'Pretendard' } } } }
    }
  });
}

function renderTrendChart() {
  const byMonth = {};
  for (const m of MONTHS_AVAILABLE) byMonth[m] = { mng:0, pln:0, actual:0 };
  for (const r of RAW_DATA) {
    if (!matchSite(r) || !matchCc(r)) continue;
    if (!r.month || !byMonth[r.month]) continue;
    if (isMng(r.btype)) byMonth[r.month].mng += toMillion(r.amount);
    else if (isPln(r.btype)) byMonth[r.month].pln += toMillion(r.amount);
    else if (isActual(r.btype)) byMonth[r.month].actual += toMillion(r.amount);
  }
  if (chartTrend) chartTrend.destroy();
  chartTrend = new Chart(document.getElementById('chart-trend'), {
    type:'line',
    data:{ labels: MONTHS_AVAILABLE.map(m => m + '월'),
      datasets:[
        { label:'경영예산', data: MONTHS_AVAILABLE.map(m => byMonth[m].mng), borderColor:'#93c5fd', backgroundColor:'rgba(147,197,253,0.10)', borderWidth:2, tension:0.3, fill:false, pointRadius:4 },
        { label:'편성예산', data: MONTHS_AVAILABLE.map(m => byMonth[m].pln), borderColor:'#60a5fa', backgroundColor:'rgba(96,165,250,0.10)', borderWidth:2, tension:0.3, fill:false, pointRadius:4, borderDash:[4,3] },
        { label:'실적', data: MONTHS_AVAILABLE.map(m => byMonth[m].actual), borderColor:'#1d4ed8', backgroundColor:'rgba(29,78,216,0.15)', borderWidth:2.5, tension:0.3, fill:true, pointRadius:5 }
      ]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{ font:{ family:'Pretendard', size:11 } } },
        tooltip:{ callbacks:{ label: ctx => `${ctx.dataset.label}: ${fmt(ctx.parsed.y)} 백만원` } } },
      scales:{ y:{ beginAtZero:true, ticks:{ callback:v=>fmt(v), font:{ family:'Pretendard' } } },
        x:{ ticks:{ font:{ family:'Pretendard' } } } }
    }
  });
}

function renderTable(data) {
  if (!data) data = aggregate();
  let filtered = data;
  if (STATE.search) {
    filtered = filtered.filter(r => (r.cc + ' ' + r.ccname + ' ' + r.elem + ' ' + r.elemname).toLowerCase().includes(STATE.search));
  }
  const sortMap = {
    site: r => SITE_ORDER.indexOf(r.site), cc: r => r.cc, ccname: r => r.ccname,
    elem: r => r.elemname, mng: r => r.mng_m, pln: r => r.pln_m, actual: r => r.actual_m,
    var: r => r.var_m, varpct: r => r.varpct == null ? -Infinity : r.varpct
  };
  filtered.sort((a, b) => {
    const va = sortMap[STATE.sortBy](a), vb = sortMap[STATE.sortBy](b);
    if (va < vb) return STATE.sortDir === 'desc' ? 1 : -1;
    if (va > vb) return STATE.sortDir === 'desc' ? -1 : 1;
    return 0;
  });
  const tbody = document.getElementById('detail-tbody');
  tbody.innerHTML = filtered.map(r => {
    let varCellClass = 'var-neutral', varDisplay = '-';
    if (r.varpct != null) {
      varDisplay = (r.varpct > 0 ? '+' : '') + r.varpct.toFixed(1) + '%';
      if (Math.abs(r.varpct) >= VAR_THRESHOLD) varCellClass = r.var_m > 0 ? 'var-bad' : 'var-good';
      else if (Math.abs(r.varpct) >= VAR_THRESHOLD / 2) varCellClass = 'var-warn';
    }
    return `<tr>
      <td>${r.site}</td><td>${r.cc}</td><td>${r.ccname || '-'}</td>
      <td>${r.elemname || r.elem || '-'}</td>
      <td class="num">${fmt(r.mng_m)}</td><td class="num">${fmt(r.pln_m)}</td>
      <td class="num"><span class="actual-link" data-cc="${r.cc}" data-elem="${r.elem}" title="클릭하면 전표 상세 보기">${fmt(r.actual_m)}</span></td>
      <td class="num ${r.var_m < 0 ? 'pos' : r.var_m > 0 ? 'neg' : ''}">${fmt(r.var_m)}</td>
      <td class="num"><span class="${varCellClass}">${varDisplay}</span></td>
    </tr>`;
  }).join('');
  if (filtered.length === 0) tbody.innerHTML = '<tr><td colspan="9" class="empty">표시할 데이터가 없습니다.</td></tr>';
}

function parseActualSheet(wb) {
  const sheetName = wb.SheetNames.find(n => n.trim() === '실적') || wb.SheetNames.find(n => n.includes('실적'));
  if (!sheetName) { log('⚠ 실적 시트 없음 — 드릴다운 비활성화'); return []; }
  const sheet = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'', raw:true });
  if (rows.length < 2) return [];
  let hr = 0;
  for (let i = 0; i < Math.min(rows.length, 10); i++) {
    const joined = rows[i].map(c => String(c)).join('|');
    if (/코스트센터|원가요소|전표/.test(joined)) { hr = i; break; }
  }
  const hd = rows[hr].map(c => String(c).trim());
  const findCol = (...patterns) => {
    for (const p of patterns) { const re = new RegExp(p); const idx = hd.findIndex(h => re.test(h.replace(/\s/g,''))); if (idx >= 0) return idx; }
    return -1;
  };
  const col = {
    cc: findCol('^코스트센터$','코스트센터번호'), elem: findCol('^원가요소$','원가요소번호'),
    ccname: findCol('코스트센터명','코스트센터.*이름'), elemname: findCol('원가요소명','원가요소.*이름'),
    voucher: findCol('전표번호','전표.*번호'), date: findCol('회계일자','전표일자','일자'),
    note: findCol('적요'), type: findCol('전표유형','유형'), amount: findCol('^금액$','발생액'),
    order: findCol('내부오더$','내부오더번호'), orderName: findCol('내부오더.*이름','내부오더명'),
  };
  const out = [];
  for (let i = hr + 1; i < rows.length; i++) {
    const r = rows[i]; const cc = String(r[col.cc] || '').trim();
    if (!cc) continue;
    const amt = parseFloat(r[col.amount]); if (isNaN(amt) || amt === 0) continue;
    const dateRaw = r[col.date]; let dateStr = '', month = null;
    if (dateRaw) {
      if (typeof dateRaw === 'string') {
        dateStr = dateRaw.split(' ')[0].trim();
        const m = dateStr.match(/(\d{4})-?(\d{2})-?(\d{2})/);
        if (m) { dateStr = `${m[1]}-${m[2]}-${m[3]}`; month = parseInt(m[2]); }
      } else if (dateRaw instanceof Date) {
        const y = dateRaw.getFullYear(), m = dateRaw.getMonth()+1, d = dateRaw.getDate();
        dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; month = m;
      } else if (typeof dateRaw === 'number') {
        const d = new Date(Date.UTC(1899, 11, 30) + dateRaw * 86400000);
        dateStr = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
        month = d.getUTCMonth() + 1;
      }
    }
    out.push({ cc, elem:String(r[col.elem]||'').trim(), ccname:String(r[col.ccname]||'').trim(),
      elemname:String(r[col.elemname]||'').trim(), voucher:String(r[col.voucher]||'').trim(),
      date:dateStr, month, note:String(r[col.note]||'').trim(), type:String(r[col.type]||'').trim(),
      amount:amt, order:String(r[col.order]||'').trim(), orderName:String(r[col.orderName]||'').trim() });
  }
  return out;
}

function openActualModal(cc, elem) {
  const matching = ACTUAL_DETAILS.filter(r => r.cc === cc && r.elem === elem)
    .filter(r => { if (!r.month) return true;
      if (STATE.mode === 'single') return r.month === STATE.singleMonth;
      return r.month <= STATE.cumulativeUpTo; })
    .sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  const sample = matching[0] || ACTUAL_DETAILS.find(r => r.cc === cc && r.elem === elem) || RAW_DATA.find(r => r.cc === cc && r.elem === elem);
  const ccName = sample ? (sample.ccname || '') : ''; const elemName = sample ? (sample.elemname || '') : '';
  document.getElementById('modal-title').textContent = `실적 상세 — ${ccName} × ${elemName}`;
  document.getElementById('modal-subtitle').textContent = `${cc} · ${elem} · ${timeLabel()}`;
  document.getElementById('modal-count').textContent = matching.length.toLocaleString() + '건';
  const sum = matching.reduce((s, r) => s + r.amount, 0);
  document.getElementById('modal-sum').textContent = sum.toLocaleString('ko-KR') + ' 원';
  if (matching.length > 0) {
    const dates = matching.map(r => r.date).filter(d => d).sort();
    document.getElementById('modal-range').textContent = dates.length ? `${dates[0]} ~ ${dates[dates.length-1]}` : '-';
  } else document.getElementById('modal-range').textContent = '-';
  const content = document.getElementById('modal-content');
  if (matching.length === 0) {
    content.innerHTML = `<div class="modal-empty">해당 조건에 일치하는 전표가 없습니다.<br><span style="font-size:11px;">현재 시간 필터: ${timeLabel()}</span></div>`;
    document.getElementById('actual-modal').classList.add('open'); return;
  }
  let html = '<table><thead><tr><th style="width:90px;">회계일자</th><th style="width:110px;">전표번호</th><th style="width:70px;">유형</th><th>적요</th><th>내부오더</th><th class="num" style="width:130px;">금액 (원)</th></tr></thead><tbody>';
  for (const r of matching) {
    const amtCls = r.amount < 0 ? 'pos' : 'neg';
    html += `<tr><td>${r.date||'-'}</td><td>${r.voucher||'-'}</td><td>${r.type||'-'}</td><td>${r.note||'-'}</td><td>${r.orderName?r.orderName:(r.order||'-')}</td><td class="num ${amtCls}">${r.amount.toLocaleString('ko-KR')}</td></tr>`;
  }
  html += `<tr style="background:#f3f4f6;font-weight:600;"><td colspan="5" style="text-align:right;padding-right:12px;">합계</td><td class="num">${sum.toLocaleString('ko-KR')}</td></tr></tbody></table>`;
  content.innerHTML = html;
  document.getElementById('actual-modal').classList.add('open');
}
function closeActualModal() { document.getElementById('actual-modal').classList.remove('open'); }

document.addEventListener('click', e => {
  if (e.target.classList && e.target.classList.contains('actual-link')) { openActualModal(e.target.dataset.cc, e.target.dataset.elem); return; }
  if (e.target.id === 'modal-close' || e.target.id === 'actual-modal') closeActualModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeActualModal(); });

// ============================================================
// 자동 로드 — data/current.xlsx fetch 후 기존 handleFile 재사용
// ============================================================
async function loadFromUrl(url) {
  document.getElementById('upload-title').textContent = '서버 데이터를 불러오는 중...';
  try {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const blob = await res.blob();
    const lastMod = res.headers.get('Last-Modified');
    const file = new File([blob], 'current.xlsx', { type: blob.type });
    await handleFile(file);
    // 우선순위: 엑셀의 최대 월(실데이터 기준) → Last-Modified(배포 시점)
    const badge = document.getElementById('data-freshness');
    if (MONTHS_AVAILABLE && MONTHS_AVAILABLE.length > 0) {
      const maxM = Math.max(...MONTHS_AVAILABLE);
      let label = `기준: ${maxM}월`;
      if (lastMod) {
        const d = new Date(lastMod);
        label += ` · 배포 ${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      }
      badge.textContent = label;
    } else if (lastMod) {
      const d = new Date(lastMod);
      badge.textContent = `배포: ${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    } else {
      badge.textContent = '서버 데이터';
    }
  } catch (e) {
    document.getElementById('upload-title').textContent = '예산실적 분석 대시보드';
    document.getElementById('upload-hint').textContent = `자동 로드 실패 (${e.message}). 엑셀 파일을 끌어다 놓아주세요.`;
    console.warn('Auto-load failed:', e);
  }
}
window.addEventListener('DOMContentLoaded', () => loadFromUrl('./data/current.xlsx'));
